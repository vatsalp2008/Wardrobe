# XcodeGen project definition for Wardrobe.
# Regenerate the .xcodeproj at any time with:  xcodegen generate
# This file is the source of truth — the .xcodeproj is gitignored.

name: Wardrobe

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # set your personal team ID in Xcode (Signing & Capabilities)
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  swift-collections:
    url: https://github.com/apple/swift-collections
    from: "1.0.0"

targets:
  Wardrobe:
    type: application
    platform: iOS
    sources:
      - path: Wardrobe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.wardrobe
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    info:
      path: Wardrobe/Info.plist
      properties:
        CFBundleDisplayName: Wardrobe
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Permission usage strings (required before App Store review)
        NSCameraUsageDescription: "Wardrobe uses the camera to photograph your clothing items so it can build your digital wardrobe."
        NSPhotoLibraryUsageDescription: "Wardrobe needs access to your photos to import clothing pictures and your try-on photo."
        NSPhotoLibraryAddUsageDescription: "Wardrobe saves your generated try-on images to your photo library."
        NSLocationWhenInUseUsageDescription: "Wardrobe uses your location to fetch local weather for weather-aware outfit suggestions."
    dependencies:
      # Linked but unused until their respective phases — safe no-ops for Phase 0.
      - package: Supabase
        product: Supabase
      - package: swift-collections
        product: Collections
    # SwiftLint runs before each build if installed (Homebrew or Apple Silicon path).
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          elif test -x /opt/homebrew/bin/swiftlint; then
            /opt/homebrew/bin/swiftlint
          else
            echo "warning: SwiftLint not installed — run 'brew install swiftlint'"
          fi

  WardrobeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WardrobeTests
    dependencies:
      - target: Wardrobe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.wardrobe.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Wardrobe:
    build:
      targets:
        Wardrobe: all
        WardrobeTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - WardrobeTests
